name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: macos-latest

    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.11.0'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run linting
        run: npm run lint

      - name: Run type checking
        run: npm run typecheck

      - name: Build project
        run: npm run build

      - name: Verify bin file is executable
        run: |
          if [ ! -x dist/index.js ]; then
            echo "Error: dist/index.js is not executable"
            ls -la dist/index.js
            exit 1
          fi
          echo "✓ dist/index.js is executable"
          ls -la dist/index.js

      - name: Extract version from tag
        id: version
        env:
          TAG_REF: ${{ github.ref }}
        run: echo "VERSION=${TAG_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Extract changelog for this version
        id: changelog
        env:
          VERSION_NUM: ${{ steps.version.outputs.VERSION }}
        run: |
          # Extract the "## [VERSION]" section body (Keep-a-Changelog style, no
          # leading 'v'). Flag-based rather than the awk range operator so the
          # next-heading terminator can't also match the start heading.
          CHANGELOG=$(awk -v ver="## [${VERSION_NUM}]" '
            index($0, ver) == 1 { flag = 1; next }
            /^## \[/ && flag { flag = 0 }
            flag { print }
          ' CHANGELOG.md)

          # If changelog section is empty, use a default message
          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details."
          fi

          # Save to file for multiline content
          echo "$CHANGELOG" > /tmp/changelog.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: /tmp/changelog.md
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Tokenless publish via npm OIDC trusted publishing (npm >= 11.5.1, which
      # ships with the pinned Node). Requires a Trusted Publisher registered on
      # npm for this repo + workflow (Package settings → Trusted Publisher →
      # GitHub Actions: jbctechsolutions/mcp-office365, workflow release.yml).
      # No NPM_TOKEN needed; --provenance publishes a signed provenance
      # attestation (needs the id-token: write permission above).
      - name: Publish to npm (OIDC trusted publishing)
        run: |
          # setup-node's registry-url writes a `//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}`
          # stanza to ~/.npmrc. With no NODE_AUTH_TOKEN it expands to an empty token, and npm then
          # uses (broken) classic auth instead of the OIDC handshake — E404/ENEEDAUTH. Strip it so
          # trusted publishing kicks in.
          npmrc="${NPM_CONFIG_USERCONFIG:-$HOME/.npmrc}"
          [ -f "$npmrc" ] && sed -i.bak '/_authToken/d' "$npmrc" && rm -f "$npmrc.bak"
          npm publish --access public --provenance
