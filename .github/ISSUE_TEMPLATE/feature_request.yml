name: ✨ Feature Request
description: Suggest a new feature or enhancement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please provide details below.

  - type: textarea
    id: description
    attributes:
      label: Feature Description
      description: Clear description of the feature
      placeholder: What should this feature do?
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use Case / Motivation
      description: Why is this feature needed? What problem does it solve?
      placeholder: I want to... because...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should this feature work?
      placeholder: Describe the ideal implementation

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Other approaches you've thought about

  - type: checkboxes
    id: backend
    attributes:
      label: Backend Applicability
      description: Which backends should support this?
      options:
        - label: AppleScript backend
        - label: Microsoft Graph API backend
        - label: Both backends

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, examples, or mockups
